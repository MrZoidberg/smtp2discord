version: 2

project_name: smtp2discord

before:
  hooks:
    - go mod tidy

builds:
  - id: smtp2discord
    main: ./cmd/smtp2discord
    binary: smtp2discord
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

dockers_v2:
  - id: smtp2discord
    dockerfile: Dockerfile
    ids:
      - smtp2discord
    images:
      - ghcr.io/{{ .Env.GITHUB_REPOSITORY_LOWER }}
    tags:
      - "{{ .Tag }}"
      - latest
    platforms:
      - linux/amd64
      - linux/arm64

changelog:
  use: github
